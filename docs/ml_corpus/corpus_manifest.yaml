    min_cross_check_coverage: 0.90
    min_attribution_completeness: 1.00
    deny_tier_3_sources: true
  commercial_fork_release:  # see ARCHITECTURE.md § 9.6.2
    min_cross_check_coverage: 0.95
    require_commercial_use_allowed: true
    require_counsel_review_certificate: true
    partition: "sa_free"  # commercial fork uses sa_free ONLY

