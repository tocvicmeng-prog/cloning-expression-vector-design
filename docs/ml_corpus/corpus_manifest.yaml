  population_notes: |
    T-1404 scope: targeted 40 backbones via WebFetch-driven NCBI eutils retrieval. Realistic
    yield was 28 INSDC-canonical records, limited by which vendor plasmids have public INSDC
    deposits (none for Novagen pET-28a / pCDFDuet / pETDuet / pRSFDuet / Invitrogen pPICZ /
    pGAPZ / pcDNA3.4 / pVAX1, Trono-lab pLKO.1 / psPAX2 / pMD2.G, etc.). Per IP-audit § 8.1
    the corpus stays Tier-1/Tier-2 (no Addgene-mediated sequence ingestion); records remain
    routable to NCBI/EBI/DDBJ/iGEM/JBEI/DNASU/vendor-published-map/primary-literature/fpbase
    sources only. The 12-record mammalian and 8-record K. phaffii backbone shortfalls are
    documented as a known backlog for future curators with bespoke vendor-manual access.

    T-1405 scope: targeted 80 modular-element records. Realistic yield was 63 records across
    all 13 categories from the schema enum (no `fluorescent_protein` records — those would
    require FPbase-mediated fetches deferred to a focused follow-up turn). Distribution:
    promoter 10, terminator 6, polyA 5, rbs 4, kozak 4, ires 4, 2a_peptide 4, mcs 3, tag 10,
    selection_cassette 6, insulator 2, wpre 2, intron 3. Two insulator records (cHS4 core,
    USP/β-globin 5'HS) carry explicit `notes` flagging the sequence as a curator
    approximation pending human cross-check against the published primary literature.
    Source mix: 62 primary_literature + 1 igem_registry (BBa_B0034). All elements carry
    PMID-anchored citations except BBa_B0034 (iGEM Registry URL). Per FR-MARK / FR-ML-09,
    `attribution_required: true` is set on all 63 modular-element records (these are
    consensus sequences whose attribution belongs to the originating paper, even though the
    bases themselves are factual per Feist v. Rural Telephone).

