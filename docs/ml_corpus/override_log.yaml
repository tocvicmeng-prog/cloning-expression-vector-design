#       NORMATIVE BR-16 specifies "no automated SnapGene access." This entry covers
#       a human-in-browser cross-check session — the cross-check itself is BR-16
#       compliant; this log entry merely records the approval trail required by
#       Rec-4 and the Fork-Readiness Memorandum.
#     compensating_controls: |
