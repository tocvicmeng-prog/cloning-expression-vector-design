#       Cross-check pass authorised at corpus completion strategy doc Rec-4. Verifies
#       INSDC-fetched sequences match the canonical SnapGene reference records for
#       these 5 well-known E. coli backbones. Performed human-in-browser by the
#       curator; this entry preserves the per-batch approval trail.
