# ML Training Corpus — NORMATIVE override log
#
# Records any deviation from the v0.2 NORMATIVE corpus posture (BR-15, BR-16,
# IP-audit § 5.2 / § 8.1, Fork-Readiness Memorandum). Every record in
# docs/ml_corpus/records/ whose snapgene_crosscheck.checked is `true` MUST have
# a corresponding entry here.  The CI gate
# `tools/ci_gates/override_log_check.py` enforces this invariant.
#
# Approval workflow (per docs/handover/2026-05-23_corpus_completion_strategies.md
# Rec-4):
#   1.  Curator proposes a batch (≤ 20 records) for cross-check.
#   2.  Curator drafts the override entry below with `approval_date: pending`.
#   3.  Project owner reviews + commits with `approval_date` filled in and the
#       commit author/email matching `approval_owner`.
#   4.  The cross-check work then proceeds; only after the batch entry is
#       committed are the corresponding record `snapgene_crosscheck.checked`
#       fields permitted to flip from `false` to `true`.
#
# This log lives in the v0.2 SA-free partition; it documents the deviation
# trail required by the Fork-Readiness Memorandum (ARCHITECTURE.md § 9.6.4)
# for any future commercial-fork audit.

override_log_id: cev.ml_corpus.override_log
schema_version: "1.0.0"
maintenance:
  scaffolded_at: "2026-05-23"
  scaffolding_task: "Backlog Rec-4 (per docs/handover/2026-05-23_corpus_completion_strategies.md)"
  scaffolding_approval: "User-authorised 2026-05-23 — see project owner message 'rec4:authorise per-batch SnapGene cross-check'"

# Entry schema (each item in `entries` MUST carry every field below):
#   - batch_id:               canonical short identifier (e.g., snapgene-cc-batch-001)
#     override_type:          enum: snapgene_cross_check_pass | addgene_depositor_side
#                                  | vendor_proprietary_sequence | curator_backtranslation
#     batch_records:          list of corpus record ids included in this batch
#     proposed_at:            ISO date (curator drafts)
#     approval_date:          ISO date (project owner fills on commit) OR `pending`
#     approval_owner:         email or identifier of the authorising owner
#     normative_section:      cross-reference to the NORMATIVE rule being overridden
#     ip_audit_section:       cross-reference to IP-audit doc (where applicable)
#     rationale:              multi-line free text — WHY this batch is overriden
#     delta_from_normative:   multi-line free text — what behaviour deviates
#     compensating_controls:  multi-line free text — what mitigations are in place
#     verification_trail:     list of artefacts the curator preserved (screenshots,
#                             logs, cross-check_log.yaml entries) supporting the
#                             approval audit trail
#     batch_outcome:          enum: pending | approved | rejected | partial

entries:
  - batch_id: addgene-depositor-batch-001
    override_type: addgene_depositor_side
    batch_records:
      - corpus.backbone.mammalian.pspax2
      - corpus.backbone.mammalian.pcaggs
    proposed_at: "2026-05-23"
    approval_date: "2026-05-23"
    approval_owner: tocvicmeng@gmail.com (project owner / GMExpression Pty Ltd / Holocyte)
    normative_section: |
      IP-audit § 8.1 Tier-2 (Addgene general posture) +
      § 5.2 fold-in (depositor-owned sequence vs. Addgene-authored metadata distinction)
    ip_audit_section: |
      docs/handover/2026-05-23_host_marker_ml_corpus_ip_audit.md § 5.2 +
      docs/handover/2026-05-23_corpus_completion_strategies.md Rec-3
    rationale: |
      User manually downloaded 2 depositor-deposited .gb files (Addgene's only
      compliant pull path — no automated login or scraping):
        - psPAX2 (Trono Lab, Addgene #12260) — Dull 1998 PMID 9696806; 10712 bp
        - pCAGGS (Miyazaki Lab) — Niwa 1991 PMID 1660837; 4800 bp
      Both records carry depositor-owned sequence + depositor-authored annotation.
      The project's per-record license posture reflects the depositor (Trono Lab,
      Miyazaki Lab), not Addgene. Both labs openly distribute these plasmids for
      academic use and have published the sequences as primary literature.
    delta_from_normative: |
      v0.2 NORMATIVE posture excluded Addgene-mediated sequence ingestion
      wholesale. Rec-3 in docs/handover/2026-05-23_corpus_completion_strategies.md
      refined this to the IP-audit § 5.2 nuance: depositor-owned content is
      legitimate corpus content; Addgene-authored metadata is excluded.
      This batch follows the nuance correctly:
        - sequence + annotation are from depositor's .gb file (kept)
        - No "How to use this plasmid" text, depositor profile text, or other
          Addgene-authored description content has been touched (excluded)
        - License posture is depositor-owned (NOT NCBI-PD; NOT Addgene-CC)
        - source_text_url points at depositor's primary publication (PMID)
    compensating_controls: |
      - Files obtained via user's authenticated browser session at addgene.org
        (no curator-side automation hitting Addgene servers).
      - File MD5 / SHA-256 of the user-provided .gb files preserved at
        `/tmp/genbank/psPAX2_addgene12260.gb` + `/tmp/genbank/pCAGGS_addgene.gb`
        within the user's local environment (not redistributed).
      - No Addgene-authored description text included in the records.
      - Provenance.source set to `primary_literature` (depositor's paper),
        with accession_or_url pointing at PubMed for the depositor's primary
        publication.
      - license.sequence_license.spdx_id set to depositor-owned identifier
        ("depositor-owned-trono-lab" / "depositor-owned-miyazaki-lab") to
        signal the nuanced posture distinct from generic NCBI-PD.
    verification_trail:
      - "C:/Users/tocvi/Downloads/Addgenefiles/ (user's local download folder; not redistributed)"
      - "/tmp/genbank/psPAX2_addgene12260.gb (curator-side cache; ephemeral)"
      - "/tmp/genbank/pCAGGS_addgene.gb (curator-side cache; ephemeral)"
      - "docs/ml_corpus/records/backbones/mammalian/{psPAX2_addgene12260,pCAGGS_addgene}.yaml (the records this batch authorises)"
    batch_outcome: approved

