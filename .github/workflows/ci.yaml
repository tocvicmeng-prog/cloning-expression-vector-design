name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  python:
    name: ${{ matrix.profile }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: core+dev
            os: ubuntu-latest
            extras: ""
          - profile: core+dev
            os: windows-latest
            extras: ""
          - profile: core+dev+io
            os: ubuntu-latest
            extras: "--extra io"
          - profile: core+dev+io
            os: windows-latest
            extras: "--extra io"
          - profile: core+dev+biology-fakes
            os: ubuntu-latest
            extras: ""
          - profile: core+dev+biology-fakes
            os: windows-latest
            extras: ""
          - profile: core+dev+primer
            os: ubuntu-latest
            extras: "--extra primer"
          - profile: core+dev+primer
            os: windows-latest
            extras: "--extra primer"
          - profile: core+dev+api
            os: ubuntu-latest
            extras: "--extra api"
          - profile: core+dev+api
            os: windows-latest
            extras: "--extra api"
          - profile: core+dev+cli
            os: ubuntu-latest
            extras: "--extra cli"
          - profile: core+dev+cli
            os: windows-latest
            extras: "--extra cli"
          - profile: core+dev+pdf
            os: ubuntu-latest
            extras: "--extra pdf"
          - profile: core+dev+pdf
            os: windows-latest
            extras: "--extra pdf"

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11.15"

      - name: Install uv
        run: python -m pip install "uv==0.11.14"

      - name: Install dependencies
        run: python -m uv sync --frozen --no-editable --group dev ${{ matrix.extras }}

      - name: Check formatting
        run: python -m uv run --no-editable ruff format --check .

      - name: Lint
        run: python -m uv run --no-editable ruff check .

      - name: Import contracts
        run: python -m uv run --no-editable lint-imports --config .importlinter

      - name: Informational CI gate skeletons
        run: |
          python -m uv run --no-editable python -m tools.ci_gates.module_coverage_check --informational
          python -m uv run --no-editable python -m tools.ci_gates.task_acceptance_completeness_check --informational
          python -m uv run --no-editable python -m tools.ci_gates.gate_lifecycle_check --informational
          python -m uv run --no-editable python -m tools.ci_gates.test_task_brief_coverage --informational

      - name: Plugin manifest signature gate
        run: python -m uv run --no-editable python -m tools.ci_gates.plugin_manifest_signature_check --enforce

      - name: Type check
        run: python -m uv run --no-editable mypy src tools tests

      - name: Test
        run: python -m uv run --no-editable python tools/ci/run_pytest.py -m "not slow"

  nightly-heavy-extras:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: core+dev+biology-vienna
            extras: "--extra biology-vienna"
          - profile: core+dev+biology-spliceai
            extras: "--extra biology-spliceai"
          - profile: core+dev+biology-signalp
            extras: "--extra biology-signalp"
          - profile: core+dev+llm-local
            extras: "--extra llm-local"
          - profile: core+dev+llm-openai
            extras: "--extra llm-openai"
          - profile: core+dev+llm-anthropic
            extras: "--extra llm-anthropic"

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11.15"
      - run: python -m pip install "uv==0.11.14"
      - run: python -m uv sync --frozen --no-editable --group dev ${{ matrix.extras }}
      - run: python -m uv run --no-editable python tools/ci/run_pytest.py -m "not slow"

  determinism-container:
    name: determinism / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11.15"

      - name: Install uv
        run: python -m pip install "uv==0.11.14"

      - name: Install deterministic release dependencies
        run: python -m uv sync --frozen --no-editable --group dev --extra io

      - name: Run release determinism check
        run: python -m uv run --no-editable python tools/ci/determinism_check.py
