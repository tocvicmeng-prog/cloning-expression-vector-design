repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: python -m uv run --no-editable ruff format
        language: system
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff check
        entry: python -m uv run --no-editable ruff check --fix
        language: system
        types_or: [python, pyi]

      - id: mypy
        name: mypy strict
        entry: python -m uv run --no-editable mypy src tools tests
        language: system
        pass_filenames: false
